[mypy]
python_version = 3.11
# Strict-ish but pragmatic: we want type signal without blocking PRs over
# library types we don't control.
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_no_return = True
strict_equality = True
# Tests focus on runtime behaviour, so we don't gate them on mypy.
[mypy-tests.*]
ignore_errors = True
